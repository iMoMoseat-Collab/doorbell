<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>กดกริ่ง</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chonburi&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F3F7FB;
    --bg-2: #E8F3FF;
    --card: #FFFFFF;
    --card-border: rgba(20,30,60,0.07);
    --text: #1B2333;
    --text-dim: rgba(27,35,51,0.62);
    --primary: #10B3A3;
    --primary-dark: #0C8F82;
    --primary-light: #5EEAD4;
    --accent: #FF6B5E;
    --accent-light: #FF9188;
    --sage: #14B872;
    --danger: #EF4444;
    --ink: #0F172A;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body { height: 100%; margin: 0; overscroll-behavior: none; }

  body {
    font-family: 'IBM Plex Sans Thai', sans-serif;
    color: var(--text);
    line-height: 1.55;
    background: linear-gradient(180deg, var(--bg-2) 0%, var(--bg) 40%, #FFFFFF 100%);
    min-height: 100dvh;
    position: relative;
    overflow-x: hidden;
  }

  .grain { display: none; }

  .glow-orb {
    position: fixed;
    top: -160px;
    left: 50%;
    transform: translateX(-50%);
    width: 420px;
    height: 420px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--glow-color, var(--primary-light)) 0%, transparent 70%);
    opacity: var(--glow-opacity, 0.3);
    filter: blur(20px);
    pointer-events: none;
    z-index: 0;
    transition: opacity 1.2s ease, background 1.2s ease;
  }

  .bloom { position: fixed; width: 320px; height: 320px; border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0; opacity: 0.32; }
  .bloom.a { top: 18%; left: -90px; background: #FFB199; }
  .bloom.b { top: 48%; right: -100px; background: #7FD8FF; }
  .bloom.c { bottom: 18%; left: -70px; background: #8CF2C4; }

  .particle-field { position: fixed; inset: 0; overflow: hidden; pointer-events: none; z-index: 0; }

  .firefly {
    position: absolute;
    bottom: -10px;
    width: var(--size, 5px);
    height: var(--size, 5px);
    border-radius: 50%;
    background: var(--glow-color, var(--primary-light));
    opacity: 0;
    animation: drift var(--dur, 9s) ease-in var(--delay, 0s) infinite;
  }

  @keyframes drift {
    0% { transform: translate(0, 0); opacity: 0; }
    10% { opacity: var(--peak, 0.55); }
    50% { transform: translate(var(--sway, 20px), -55vh); }
    90% { opacity: var(--peak, 0.55); }
    100% { transform: translate(calc(var(--sway, 20px) * -1), -100vh); opacity: 0; }
  }

  .scroll-area {
    position: relative;
    z-index: 1;
    max-width: 460px;
    margin: 0 auto;
    padding: max(22px, env(safe-area-inset-top)) 20px 168px;
    animation: rise 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes rise { 0% { opacity: 0; transform: translateY(16px); } 100% { opacity: 1; transform: translateY(0); } }

  .hero { text-align: center; padding: 4px 0 22px; }
  .hero svg { width: 108px; height: auto; margin-bottom: 6px; filter: drop-shadow(0 8px 16px rgba(16,179,163,0.18)); }

  .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--primary-dark);
    font-weight: 600;
    margin: 0 0 8px;
  }

  h1 {
    font-family: 'Chonburi', cursive;
    font-weight: 400;
    font-size: 44px;
    line-height: 1.1;
    margin: 0 0 8px;
    background: linear-gradient(135deg, var(--primary-dark), var(--accent));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .sub { font-size: 15px; color: var(--text-dim); margin: 0; }

  .clinic-badge {
    display: inline-block;
    font-size: 12px;
    font-weight: 700;
    color: var(--primary-dark);
    background: rgba(16,179,163,0.12);
    border: 1px solid rgba(16,179,163,0.28);
    border-radius: 999px;
    padding: 4px 14px;
    margin: 0 0 10px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 24px;
    padding: 20px 18px;
    box-shadow: 0 12px 32px rgba(20,30,60,0.08);
    margin-bottom: 16px;
  }

  .card-eyebrow {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--primary-dark);
    margin: 0 0 14px;
  }

  .card-eyebrow .num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: #fff;
    font-size: 11px;
    font-weight: 700;
  }

  label.field-label { display: block; font-size: 14px; font-weight: 700; color: var(--text); margin: 0 0 9px; }
  .field-label .opt { font-weight: 400; color: var(--text-dim); font-size: 12.5px; }

  input[type="text"], textarea {
    width: 100%;
    background: #F6F9FC;
    border: 1.5px solid var(--card-border);
    border-radius: 13px;
    padding: 13px 15px;
    color: var(--text);
    font-family: 'IBM Plex Sans Thai', sans-serif;
    font-size: 16px;
    line-height: 1.4;
    outline: none;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }

  input[type="text"]:focus, textarea:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(16,179,163,0.16);
  }

  input::placeholder, textarea::placeholder { color: rgba(27,35,51,0.35); }
  textarea { resize: none; min-height: 66px; font-family: inherit; }

  .service-scroll {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    padding: 2px 2px 10px;
    margin-bottom: 2px;
  }

  .service-chip {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 10px 15px;
    border-radius: 999px;
    border: 1.5px solid transparent;
    font-family: 'IBM Plex Sans Thai', sans-serif;
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
    color: #fff;
    background: linear-gradient(135deg, var(--sv-a), var(--sv-b));
    box-shadow: 0 4px 14px var(--sv-shadow);
    transition: transform 0.15s ease, box-shadow 0.2s ease, filter 0.2s ease;
  }

  .service-chip svg { width: 15px; height: 15px; flex-shrink: 0; }
  .service-chip .check { width: 0; opacity: 0; margin-left: -2px; transition: width 0.2s ease, opacity 0.2s ease, margin 0.2s ease; }
  .service-chip.active .check { width: 15px; opacity: 1; margin-left: 2px; }
  .service-chip:active { transform: scale(0.95); }

  .service-chip.active {
    filter: brightness(1.05);
    border-color: rgba(20,30,60,0.25);
    transform: scale(1.05);
    box-shadow: 0 6px 20px var(--sv-shadow), 0 0 0 3px rgba(20,30,60,0.06);
  }

  .service-chip.lineman { --sv-a: #7ED957; --sv-b: #1FA341; --sv-shadow: rgba(80,200,90,0.35); }
  .service-chip.grab    { --sv-a: #4FE0A6; --sv-b: #0F9D6E; --sv-shadow: rgba(20,180,130,0.35); }
  .service-chip.flash   { --sv-a: #FFC24B; --sv-b: #F4881E; --sv-shadow: rgba(244,140,30,0.35); }
  .service-chip.post    { --sv-a: #FF7A7A; --sv-b: #D9273F; --sv-shadow: rgba(217,39,63,0.35); }

  .or-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 16px 0;
    color: var(--text-dim);
    font-size: 12px;
    font-weight: 600;
  }

  .or-divider::before, .or-divider::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--card-border);
  }

  .divider { height: 1px; background: linear-gradient(90deg, transparent, var(--card-border), transparent); margin: 18px 0; }

  .chips { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .chip {
    display: flex;
    align-items: center;
    gap: 9px;
    background: linear-gradient(135deg, var(--pc-a, #F6F9FC), var(--pc-b, #F6F9FC));
    border: 1.5px solid var(--card-border);
    border-radius: 15px;
    padding: 13px 12px;
    color: var(--text);
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: border-color 0.15s ease, transform 0.1s ease, filter 0.2s ease;
    text-align: left;
  }

  .chip[data-value="ส่งอาหาร"] { --pc-a: rgba(255,140,66,0.24); --pc-b: rgba(255,140,66,0.06); }
  .chip[data-value="ส่งพัสดุ"] { --pc-a: rgba(79,166,255,0.24); --pc-b: rgba(79,166,255,0.06); }
  .chip[data-value="รับยา"]   { --pc-a: rgba(20,184,114,0.24); --pc-b: rgba(20,184,114,0.06); }
  .chip[data-value="อื่นๆ"]    { --pc-a: rgba(168,113,255,0.24); --pc-b: rgba(168,113,255,0.06); }

  .chip .emoji { font-size: 19px; }
  .chip.active { border-color: rgba(20,30,60,0.3); filter: brightness(0.98); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(20,30,60,0.08); }
  .chip:active { transform: scale(0.97); }

  .gap { margin-top: 14px; }

  .hint {
    font-size: 13px;
    font-weight: 500;
    color: var(--danger);
    margin: 10px 2px 0;
    min-height: 16px;
    opacity: 0;
    transform: translateY(-2px);
    transition: opacity 0.2s ease, transform 0.2s ease;
  }

  .hint.show { opacity: 1; transform: translateY(0); }

  .live-preview {
    font-size: 13px;
    font-weight: 600;
    color: var(--sage);
    margin: 10px 2px 0;
    min-height: 16px;
    opacity: 0;
    transform: translateY(-2px);
    transition: opacity 0.25s ease, transform 0.25s ease;
  }

  .live-preview.show { opacity: 1; transform: translateY(0); }

  footer {
    text-align: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.08em;
    color: rgba(27,35,51,0.4);
    padding-top: 6px;
  }

  .action-bar {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    z-index: 6;
    display: flex;
    justify-content: center;
    padding: 14px 20px max(14px, env(safe-area-inset-bottom));
    background: linear-gradient(to top, rgba(255,255,255,0.96) 55%, rgba(255,255,255,0));
    backdrop-filter: blur(6px);
  }

  .action-inner {
    width: 100%;
    max-width: 460px;
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 26px;
    padding: 10px 14px 10px 22px;
    box-shadow: 0 14px 34px rgba(20,30,60,0.14);
  }

  .action-text { flex: 1; min-width: 0; }

  .call-btn {
    flex-shrink: 0;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(20,184,114,0.12);
    border: 1.5px solid rgba(20,184,114,0.3);
    color: var(--sage);
    text-decoration: none;
    transition: transform 0.15s ease, background 0.15s ease;
  }

  .call-btn svg { width: 19px; height: 19px; }
  .call-btn:active { transform: scale(0.92); background: rgba(20,184,114,0.22); }

  .ring-caption { font-size: 15px; font-weight: 700; color: var(--text); margin: 0; }

  .ring-status {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11.5px;
    color: var(--text-dim);
    margin: 2px 0 0;
    min-height: 14px;
  }

  .ring-status.success { color: var(--sage); }
  .ring-status.error { color: var(--danger); }

  .bell-btn {
    position: relative;
    width: 68px;
    height: 68px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    background: linear-gradient(135deg, var(--accent-light), var(--accent) 60%, #E64A3E 100%);
    box-shadow: 0 8px 22px rgba(255,107,94,0.4), inset 0 2px 5px rgba(255,255,255,0.45), inset 0 -5px 8px rgba(0,0,0,0.12);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.12s ease, box-shadow 0.3s ease, filter 0.3s ease;
    flex-shrink: 0;
    animation: breathe 3.2s ease-in-out infinite;
  }

  @keyframes breathe {
    0%, 100% { box-shadow: 0 8px 22px rgba(255,107,94,0.4), inset 0 2px 5px rgba(255,255,255,0.45), inset 0 -5px 8px rgba(0,0,0,0.12); }
    50% { box-shadow: 0 8px 32px rgba(255,107,94,0.65), inset 0 2px 5px rgba(255,255,255,0.5), inset 0 -5px 8px rgba(0,0,0,0.12); }
  }

  .bell-btn:active { transform: scale(0.9); }
  .bell-btn.ringing { animation: shake 0.5s ease-in-out; }

  @keyframes shake {
    0%, 100% { transform: rotate(0); }
    20% { transform: rotate(-14deg); }
    40% { transform: rotate(11deg); }
    60% { transform: rotate(-8deg); }
    80% { transform: rotate(4deg); }
  }

  .bell-btn:disabled { filter: grayscale(0.5) brightness(1.05); cursor: default; animation: none; }
  .bell-btn svg.bell-icon { width: 30px; height: 30px; position: relative; z-index: 2; }

  .ring { position: absolute; inset: 0; border-radius: 50%; border: 2px solid var(--accent); opacity: 0; pointer-events: none; }
  .ring.animate { animation: expand 1.1s ease-out forwards; }
  .ring.r2.animate { animation-delay: 0.15s; }
  .ring.r3.animate { animation-delay: 0.3s; }

  @keyframes expand { 0% { transform: scale(1); opacity: 0.6; } 100% { transform: scale(2.4); opacity: 0; } }

  .flash {
    position: fixed; inset: 0;
    background: radial-gradient(circle at 50% 92%, rgba(255,145,136,0.35), transparent 60%);
    opacity: 0; pointer-events: none; z-index: 3;
  }

  .flash.burst { animation: flashpop 0.6s ease-out forwards; }
  @keyframes flashpop { 0% { opacity: 0; } 25% { opacity: 1; } 100% { opacity: 0; } }

  .sparkle-field { position: fixed; inset: 0; pointer-events: none; z-index: 4; }

  .sparkle {
    position: absolute; width: 6px; height: 6px; border-radius: 50%;
    background: var(--primary); box-shadow: 0 0 6px 1px rgba(16,179,163,0.6);
    left: var(--x, 50%); top: var(--y, 70%);
    animation: sparkle-out 0.9s ease-out forwards;
  }

  @keyframes sparkle-out {
    0% { transform: translate(0, 0) scale(1); opacity: 1; }
    100% { transform: translate(var(--tx, 0), var(--ty, -60px)) scale(0); opacity: 0; }
  }

  .confetti-emoji {
    position: absolute;
    font-size: 22px;
    left: var(--x, 50%);
    top: var(--y, 70%);
    transform-origin: center;
    animation: confetti-float 1.3s cubic-bezier(0.2, 0.6, 0.3, 1) forwards;
  }

  @keyframes confetti-float {
    0% { transform: translate(0, 0) rotate(0deg) scale(0.4); opacity: 0; }
    15% { opacity: 1; transform: translate(calc(var(--tx, 0) * 0.2), calc(var(--ty, -80px) * 0.2)) rotate(var(--rot, 90deg)) scale(1); }
    100% { transform: translate(var(--tx, 0), var(--ty, -80px)) rotate(calc(var(--rot, 90deg) * 2)) scale(0.7); opacity: 0; }
  }

  .bell-btn.nudge { animation: nudge 0.7s ease-in-out; }
  @keyframes nudge {
    0%, 100% { transform: translateY(0) rotate(0); }
    25% { transform: translateY(-4px) rotate(-6deg); }
    50% { transform: translateY(0) rotate(5deg); }
    75% { transform: translateY(-2px) rotate(-3deg); }
  }

  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    .firefly, .sparkle, .confetti-emoji { display: none; }
  }
</style>
</head>
<body>

<svg class="grain" width="100%" height="100%">
  <filter id="noiseFilter"><feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/></filter>
  <rect width="100%" height="100%" filter="url(#noiseFilter)"/>
</svg>

<div class="glow-orb" id="glowOrb"></div>
<div class="bloom a"></div>
<div class="bloom b"></div>
<div class="bloom c"></div>
<div class="particle-field" id="particleField"></div>
<div class="flash" id="flashFx"></div>
<div class="sparkle-field" id="sparkleField"></div>

<div class="scroll-area">

  <div class="hero">
    <svg viewBox="0 0 120 130" fill="none" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="60" cy="60" rx="34" ry="10" fill="url(#lanternGlow)" opacity="0.5"/>
      <defs>
        <radialGradient id="lanternGlow" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#FF9188"/>
          <stop offset="100%" stop-color="#FF9188" stop-opacity="0"/>
        </radialGradient>
      </defs>
      <path d="M28 128V52C28 30 42 14 60 14C78 14 92 30 92 52V128" stroke="#0C8F82" stroke-width="3" stroke-linecap="round"/>
      <rect x="42" y="72" width="36" height="56" rx="3" stroke="#0C8F82" stroke-width="3"/>
      <circle cx="70" cy="100" r="2.6" fill="#0C8F82"/>
      <line x1="42" y1="90" x2="78" y2="90" stroke="#0C8F82" stroke-width="2" opacity="0.55"/>
      <g>
        <line x1="60" y1="14" x2="60" y2="4" stroke="#0C8F82" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M52 4h16l-3 12H55L52 4z" fill="#FF9188" stroke="#0C8F82" stroke-width="2" stroke-linejoin="round"/>
      </g>
    </svg>
    <p class="eyebrow" id="timeEyebrow">—</p>
    <h1>กดกริ่ง</h1>
    <p class="clinic-badge">คลินิกหมอขวัญ แพทย์แผนจีน</p>
    <p class="sub">แจ้งเจ้าหน้าที่ให้รู้ว่าคุณมาถึงแล้ว</p>
  </div>

  <div class="card">
    <p class="card-eyebrow"><span class="num">1</span> คุณคือใคร</p>

    <label class="field-label">เป็นบริการนี้ไหม? <span class="opt">แตะเลือกได้เลย</span></label>
    <div class="service-scroll" id="serviceScroll">
      <button type="button" class="service-chip lineman" data-name="Lineman">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="6" cy="18" r="2.4" stroke="currentColor" stroke-width="1.8"/><circle cx="17" cy="18" r="2.4" stroke="currentColor" stroke-width="1.8"/><path d="M6 18l3-8h4l2 4h4M9 10l1.5-3h3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Lineman
        <svg class="check" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M5 12.5l4.5 4.5L19 7" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button type="button" class="service-chip grab" data-name="Grab">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="6" cy="18" r="2.4" stroke="currentColor" stroke-width="1.8"/><circle cx="17" cy="18" r="2.4" stroke="currentColor" stroke-width="1.8"/><path d="M6 18l3-8h4l2 4h4M9 10l1.5-3h3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Grab
        <svg class="check" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M5 12.5l4.5 4.5L19 7" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button type="button" class="service-chip flash" data-name="Flash">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="4" y="8" width="16" height="10" rx="1.5" stroke="currentColor" stroke-width="1.8"/><path d="M4 12h16M9 8V6.5a1.5 1.5 0 0 1 1.5-1.5h3A1.5 1.5 0 0 1 15 6.5V8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        Flash
        <svg class="check" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M5 12.5l4.5 4.5L19 7" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button type="button" class="service-chip post" data-name="ไปรษณีย์">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="3.5" y="6" width="17" height="12" rx="1.5" stroke="currentColor" stroke-width="1.8"/><path d="M4 7.5l8 6 8-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        ไปรษณีย์
        <svg class="check" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M5 12.5l4.5 4.5L19 7" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>

    <div class="or-divider"><span>หรือ</span></div>

    <label class="field-label" for="guestName">พิมพ์ชื่อของคุณเอง <span class="opt">(ไม่ระบุก็ได้)</span></label>
    <input type="text" id="guestName" placeholder="เช่น ลูกค้า, คุณสมชาย" maxlength="60">
  </div>

  <div class="card">
    <p class="card-eyebrow"><span class="num">2</span> มาทำอะไร</p>
    <div class="chips" id="purposeChips">
      <button type="button" class="chip" data-value="ส่งอาหาร"><span class="emoji">🍜</span>ส่งอาหาร</button>
      <button type="button" class="chip" data-value="ส่งพัสดุ"><span class="emoji">📦</span>ส่งพัสดุ</button>
      <button type="button" class="chip" data-value="รับยา"><span class="emoji">💊</span>รับยา</button>
      <button type="button" class="chip" data-value="อื่นๆ"><span class="emoji">✍️</span>อื่นๆ</button>
    </div>
    <p class="hint" id="purposeHint">เลือกเหตุผลที่มาก่อนกดกริ่ง</p>
    <p class="live-preview" id="livePreview"></p>

    <div class="divider"></div>

    <label class="field-label gap" for="guestMsg">ข้อความเพิ่มเติม <span class="opt">(ถ้ามี)</span></label>
    <textarea id="guestMsg" placeholder="เช่น รอที่หน้าประตูสักครู่" maxlength="140"></textarea>
  </div>

  <footer>MORKWAN TCM · คลินิกหมอขวัญ แพทย์แผนจีน</footer>

</div>

<div class="action-bar">
  <div class="action-inner">
    <a class="call-btn" id="callBtn" href="tel:0800000000" aria-label="โทรหาเจ้าหน้าที่">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M6.6 10.8c1.4 2.8 3.8 5.2 6.6 6.6l2.2-2.2c.3-.3.7-.4 1.1-.2 1.2.4 2.5.6 3.8.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C11.9 21 3 12.1 3 1.7c0-.6.4-1 1-1h3.4c.6 0 1 .4 1 1 0 1.3.2 2.6.6 3.8.1.4 0 .8-.2 1.1L6.6 10.8z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/></svg>
    </a>
    <div class="action-text">
      <p class="ring-caption" id="ringCaption">แตะเพื่อกดกริ่ง</p>
      <p class="ring-status" id="ringStatus"></p>
    </div>
    <button class="bell-btn" id="bellBtn" aria-label="กดกริ่ง">
      <span class="ring r1" id="ringFx"></span>
      <span class="ring r2" id="ringFx2"></span>
      <span class="ring r3" id="ringFx3"></span>
      <svg class="bell-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 3C9.5 3 8 5 8 7.5v3c0 1.2-.5 2.3-1.4 3.1L5 15.2c-.6.5-.3 1.5.5 1.5h13c.8 0 1.1-1 .5-1.5l-1.6-1.6c-.9-.8-1.4-1.9-1.4-3.1v-3C16 5 14.5 3 12 3z" stroke="#12162B" stroke-width="1.6" stroke-linejoin="round" fill="rgba(10,13,29,0.15)"/>
        <path d="M10 18a2 2 0 0 0 4 0" stroke="#12162B" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
</div>

<script>
  const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/1522560371146096790/MGRZVWG5BmOzXqLD9_gSKB2iHM0IZUvpgSbU9FyJU5kVLkXdSA5YzLTKqtCLLb84Ed2x";
  // เบอร์โทรเจ้าหน้าที่คลินิก ใช้ตอนแขกกดปุ่มโทรแทนกริ่ง (แก้เป็นเบอร์จริงของคลินิก รูปแบบ 0812345678)
  const CLINIC_PHONE = "0800000000";
  document.getElementById("callBtn").href = `tel:${CLINIC_PHONE}`;
  const COOLDOWN_SECONDS = 45;

  const PURPOSE_EMOJI = { "ส่งอาหาร": "🍜", "ส่งพัสดุ": "📦", "รับยา": "💊", "อื่นๆ": "✍️" };
  const PURPOSE_COLOR = { "ส่งอาหาร": 0xFF8C42, "ส่งพัสดุ": 0x4FA6FF, "รับยา": 0x7AE097, "อื่นๆ": 0xC796FF };
  const PURPOSE_TWEMOJI = { "ส่งอาหาร": "1f35c", "ส่งพัสดุ": "1f4e6", "รับยา": "1f48a", "อื่นๆ": "270f" };
  const PURPOSE_CONFETTI = {
    "ส่งอาหาร": ["🍜", "🥟", "🍡", "🥢"],
    "ส่งพัสดุ": ["📦", "🏷️", "📮", "✨"],
    "รับยา": ["💊", "🌿", "💚", "✨"],
    "อื่นๆ": ["✍️", "💌", "⭐", "✨"]
  };
  const LOADING_PHRASES = [
    "กำลังส่งเสียงกริ่ง...",
    "ปลุกเจ้าหน้าที่...",
    "กำลังบินไปหา...",
    "เกือบถึงแล้ว...",
    "ส่งสัญญาณ...📡"
  ];

  function formatThaiTime(date) {
    return new Intl.DateTimeFormat("th-TH-u-ca-buddhist", {
      dateStyle: "long", timeStyle: "short", timeZone: "Asia/Bangkok"
    }).format(date);
  }

  const hour = new Date().getHours();
  let eyebrowText, glowColor, glowOpacity;
  if (hour >= 5 && hour < 11) { eyebrowText = "อรุณสวัสดิ์"; glowColor = "#FFD9A0"; glowOpacity = "0.28"; }
  else if (hour >= 11 && hour < 17) { eyebrowText = "ช่วงกลางวัน"; glowColor = "#FFE9C2"; glowOpacity = "0.18"; }
  else if (hour >= 17 && hour < 20) { eyebrowText = "โพล้เพล้"; glowColor = "#FFB86B"; glowOpacity = "0.4"; }
  else { eyebrowText = "ยามค่ำคืน"; glowColor = "#7C8CD9"; glowOpacity = "0.3"; }
  document.getElementById("timeEyebrow").textContent = eyebrowText;
  document.getElementById("glowOrb").style.setProperty("--glow-color", glowColor);
  document.getElementById("glowOrb").style.setProperty("--glow-opacity", glowOpacity);

  const particleField = document.getElementById("particleField");
  for (let i = 0; i < 16; i++) {
    const f = document.createElement("span");
    f.className = "firefly";
    f.style.left = `${Math.random() * 100}%`;
    f.style.setProperty("--size", `${2 + Math.random() * 3}px`);
    f.style.setProperty("--dur", `${7 + Math.random() * 8}s`);
    f.style.setProperty("--delay", `${Math.random() * -10}s`);
    f.style.setProperty("--sway", `${(Math.random() - 0.5) * 60}px`);
    f.style.setProperty("--peak", `${0.4 + Math.random() * 0.4}`);
    f.style.setProperty("--glow-color", glowColor);
    particleField.appendChild(f);
  }

  const livePreview = document.getElementById("livePreview");
  function updateLivePreview() {
    const name = guestNameInput.value.trim();
    if (!selectedPurpose && !name) {
      livePreview.classList.remove("show");
      return;
    }
    const emoji = PURPOSE_EMOJI[selectedPurpose] || "👋";
    const parts = [];
    if (selectedPurpose) parts.push(`${emoji} ${selectedPurpose}`);
    if (name) parts.push(`จาก ${name}`);
    livePreview.textContent = "พร้อมส่ง: " + parts.join(" • ");
    livePreview.classList.add("show");
  }

  const guestNameInput = document.getElementById("guestName");
  const serviceChips = document.querySelectorAll(".service-chip");
  serviceChips.forEach(chip => {
    chip.addEventListener("click", () => {
      const alreadyActive = chip.classList.contains("active");
      serviceChips.forEach(c => c.classList.remove("active"));
      if (alreadyActive) {
        guestNameInput.value = "";
        guestNameInput.focus();
      } else {
        chip.classList.add("active");
        guestNameInput.value = chip.dataset.name;
      }
      updateLivePreview();
    });
  });
  guestNameInput.addEventListener("input", () => {
    const match = [...serviceChips].find(c => c.dataset.name === guestNameInput.value);
    serviceChips.forEach(c => c.classList.toggle("active", c === match));
    updateLivePreview();
  });

  let selectedPurpose = null;
  const chips = document.querySelectorAll(".chip");
  const purposeHint = document.getElementById("purposeHint");
  chips.forEach(chip => {
    chip.addEventListener("click", () => {
      chips.forEach(c => c.classList.remove("active"));
      chip.classList.add("active");
      selectedPurpose = chip.dataset.value;
      purposeHint.classList.remove("show");
      updateLivePreview();
    });
  });

  const bellBtn = document.getElementById("bellBtn");
  const ringFx = document.getElementById("ringFx");
  const ringFx2 = document.getElementById("ringFx2");
  const ringFx3 = document.getElementById("ringFx3");
  const flashFx = document.getElementById("flashFx");
  const sparkleField = document.getElementById("sparkleField");
  const ringCaption = document.getElementById("ringCaption");
  const ringStatus = document.getElementById("ringStatus");

  let cooldownTimer = null;

  // ---- เสียงกริ่ง (สังเคราะห์เสียงเอง ไม่ต้องใช้ไฟล์เสียง) ----
  let audioCtx = null;
  function playChime() {
    try {
      audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === "suspended") audioCtx.resume();
      const now = audioCtx.currentTime;
      const notes = [
        { freq: 880, start: 0, dur: 0.55 },
        { freq: 659.25, start: 0.22, dur: 0.7 }
      ];
      notes.forEach(n => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = "sine";
        osc.frequency.value = n.freq;
        gain.gain.setValueAtTime(0, now + n.start);
        gain.gain.linearRampToValueAtTime(0.28, now + n.start + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, now + n.start + n.dur);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start(now + n.start);
        osc.stop(now + n.start + n.dur + 0.05);
      });
    } catch (e) { /* เบราว์เซอร์ไม่รองรับ Web Audio ก็แค่ไม่มีเสียง ไม่กระทบการทำงานหลัก */ }
  }

  function playRipple() {
    [ringFx, ringFx2, ringFx3].forEach(el => { el.classList.remove("animate"); void el.offsetWidth; el.classList.add("animate"); });
    bellBtn.classList.remove("ringing"); void bellBtn.offsetWidth; bellBtn.classList.add("ringing");
    flashFx.classList.remove("burst"); void flashFx.offsetWidth; flashFx.classList.add("burst");
  }

  function playSparkleBurst() {
    const rect = bellBtn.getBoundingClientRect();
    const originX = rect.left + rect.width / 2;
    const originY = rect.top + rect.height / 2;
    for (let i = 0; i < 18; i++) {
      const s = document.createElement("span");
      s.className = "sparkle";
      const angle = (Math.PI * 2 * i) / 18 + Math.random() * 0.3;
      const dist = 50 + Math.random() * 70;
      s.style.setProperty("--x", `${originX}px`);
      s.style.setProperty("--y", `${originY}px`);
      s.style.setProperty("--tx", `${Math.cos(angle) * dist}px`);
      s.style.setProperty("--ty", `${Math.sin(angle) * dist - 30}px`);
      sparkleField.appendChild(s);
      setTimeout(() => s.remove(), 950);
    }
  }

  function playEmojiConfetti(purpose) {
    const set = PURPOSE_CONFETTI[purpose] || ["✨"];
    const rect = bellBtn.getBoundingClientRect();
    const originX = rect.left + rect.width / 2;
    const originY = rect.top + rect.height / 2;
    for (let i = 0; i < 14; i++) {
      const e = document.createElement("span");
      e.className = "confetti-emoji";
      e.textContent = set[Math.floor(Math.random() * set.length)];
      const angle = -Math.PI / 2 + (Math.random() - 0.5) * 2.2;
      const dist = 70 + Math.random() * 90;
      e.style.setProperty("--x", `${originX}px`);
      e.style.setProperty("--y", `${originY}px`);
      e.style.setProperty("--tx", `${Math.cos(angle) * dist}px`);
      e.style.setProperty("--ty", `${Math.sin(angle) * dist - 40}px`);
      e.style.setProperty("--rot", `${(Math.random() - 0.5) * 260}deg`);
      sparkleField.appendChild(e);
      setTimeout(() => e.remove(), 1350);
    }
  }

  // ---- ชวนกดเบาๆ ถ้ายังไม่มีใครแตะปุ่มในช่วงแรก ----
  let bellTouched = false;
  setTimeout(() => {
    if (!bellTouched && !bellBtn.disabled) bellBtn.classList.add("nudge");
  }, 6000);
  bellBtn.addEventListener("pointerdown", () => { bellTouched = true; });

  function startCooldown(seconds) {
    let remaining = seconds;
    bellBtn.disabled = true;
    const tick = () => {
      const m = Math.floor(remaining / 60);
      const s = String(remaining % 60).padStart(2, "0");
      ringCaption.textContent = `กดกริ่งได้อีกครั้งใน ${m}:${s}`;
      remaining--;
      if (remaining < 0) {
        clearInterval(cooldownTimer);
        bellBtn.disabled = false;
        ringCaption.textContent = "แตะเพื่อกดกริ่ง";
        ringStatus.textContent = "";
        ringStatus.className = "ring-status";
      }
    };
    tick();
    cooldownTimer = setInterval(tick, 1000);
  }

  async function sendRing() {
    if (!selectedPurpose) {
      purposeHint.classList.add("show");
      document.getElementById("purposeChips").animate(
        [{ transform: "translateX(-4px)" }, { transform: "translateX(4px)" }, { transform: "translateX(0)" }],
        { duration: 220 }
      );
      return;
    }

    bellBtn.disabled = true;
    playRipple();
    playChime();

    ringCaption.textContent = LOADING_PHRASES[Math.floor(Math.random() * LOADING_PHRASES.length)];
    ringStatus.textContent = "";
    ringStatus.className = "ring-status";

    const guestName = guestNameInput.value.trim() || "ไม่ระบุชื่อ";
    const guestMsg = document.getElementById("guestMsg").value.trim();
    const emoji = PURPOSE_EMOJI[selectedPurpose] || "🔔";
    const color = PURPOSE_COLOR[selectedPurpose] || 0xC9974D;

    const embed = {
      author: { name: "🔔 มีคนกดกริ่งที่คลินิก" },
      description: `## ${emoji}  ${selectedPurpose}\n▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬`,
      color: color,
      thumbnail: { url: `https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/${PURPOSE_TWEMOJI[selectedPurpose] || "1f514"}.png` },
      fields: [
        { name: "👤  ชื่อ", value: guestName, inline: true },
        { name: "🕐  เวลา", value: formatThaiTime(new Date()), inline: true }
      ],
      footer: { text: "MorKwan TCM · กริ่งหน้าคลินิก" },
      timestamp: new Date().toISOString()
    };
    if (guestMsg) embed.fields.push({ name: "💬  ข้อความจากผู้มาเยือน", value: guestMsg, inline: false });

    try {
      const res = await fetch(DISCORD_WEBHOOK_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          username: "กริ่งคลินิก MorKwan",
          avatar_url: "https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f514.png",
          embeds: [embed]
        })
      });
      if (!res.ok) throw new Error("bad status");

      ringCaption.textContent = "ส่งแจ้งเตือนแล้ว";
      ringStatus.textContent = "รอสักครู่ เจ้าหน้าที่กำลังมา";
      ringStatus.className = "ring-status success";
      playSparkleBurst();
      playEmojiConfetti(selectedPurpose);
      startCooldown(COOLDOWN_SECONDS);
    } catch (err) {
      ringCaption.textContent = "ส่งไม่สำเร็จ";
      ringStatus.textContent = "แตะปุ่มอีกครั้งเพื่อลองใหม่";
      ringStatus.className = "ring-status error";
      bellBtn.disabled = false;
    }
  }

  bellBtn.addEventListener("click", sendRing);
</script>

</body>
</html>
