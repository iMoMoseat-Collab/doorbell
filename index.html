<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>กดกริ่ง</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chonburi&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #12162B;
    --bg-deep-2: #1B2140;
    --panel: rgba(255,255,255,0.06);
    --panel-border: rgba(255,255,255,0.10);
    --brass: #C9974D;
    --brass-light: #E8C077;
    --glow: #FFB86B;
    --cream: #F5EFE4;
    --cream-dim: rgba(245,239,228,0.62);
    --sage: #8FBF9F;
    --danger: #E08585;
    --ink: #0A0D1D;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    margin: 0;
    overscroll-behavior: none;
  }

  body {
    font-family: 'IBM Plex Sans Thai', sans-serif;
    color: var(--cream);
    background: radial-gradient(120% 90% at 50% -10%, var(--bg-deep-2) 0%, var(--bg-deep) 55%, var(--ink) 100%);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    padding: max(20px, env(safe-area-inset-top)) 20px max(20px, env(safe-area-inset-bottom));
    position: relative;
    overflow-x: hidden;
    transition: background 1.2s ease;
  }

  /* ambient porch glow, position/color shifts by time of day via JS custom properties */
  .glow-orb {
    position: fixed;
    top: -140px;
    left: 50%;
    transform: translateX(-50%);
    width: 380px;
    height: 380px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--glow-color, var(--glow)) 0%, transparent 70%);
    opacity: var(--glow-opacity, 0.35);
    filter: blur(10px);
    pointer-events: none;
    z-index: 0;
    transition: opacity 1.2s ease, background 1.2s ease;
  }

  .particle-field {
    position: fixed;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
    z-index: 0;
  }

  .firefly {
    position: absolute;
    bottom: -10px;
    width: var(--size, 4px);
    height: var(--size, 4px);
    border-radius: 50%;
    background: var(--glow-color, var(--glow));
    box-shadow: 0 0 8px 2px var(--glow-color, var(--glow));
    opacity: 0;
    animation: drift var(--dur, 9s) ease-in var(--delay, 0s) infinite;
  }

  @keyframes drift {
    0% { transform: translate(0, 0); opacity: 0; }
    10% { opacity: var(--peak, 0.7); }
    50% { transform: translate(var(--sway, 20px), -55vh); }
    90% { opacity: var(--peak, 0.7); }
    100% { transform: translate(calc(var(--sway, 20px) * -1), -100vh); opacity: 0; }
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 440px;
    margin: 0 auto;
    width: 100%;
    display: flex;
    flex-direction: column;
    flex: 1;
    gap: 18px;
    animation: rise 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes rise {
    0% { opacity: 0; transform: translateY(14px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  header { text-align: center; padding-top: 6px; }

  .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--cream-dim);
    margin: 0 0 10px;
  }

  h1 {
    font-family: 'Chonburi', cursive;
    font-weight: 400;
    font-size: 34px;
    margin: 0 0 6px;
    color: var(--brass-light);
    text-shadow: 0 0 24px rgba(233,192,119,0.25);
  }

  .sub {
    font-size: 14px;
    color: var(--cream-dim);
    margin: 0;
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 20px;
    padding: 18px;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
  }

  label.field-label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--cream);
    margin: 0 0 8px;
  }

  .field-label .opt {
    font-weight: 400;
    color: var(--cream-dim);
    font-size: 12px;
  }

  input[type="text"], textarea {
    width: 100%;
    background: rgba(0,0,0,0.22);
    border: 1px solid var(--panel-border);
    border-radius: 12px;
    padding: 12px 14px;
    color: var(--cream);
    font-family: 'IBM Plex Sans Thai', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s ease;
  }

  input[type="text"]:focus, textarea:focus {
    border-color: var(--brass);
  }

  input::placeholder, textarea::placeholder { color: rgba(245,239,228,0.32); }

  textarea { resize: none; min-height: 64px; font-family: inherit; }

  .chips {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .chip {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(0,0,0,0.22);
    border: 1px solid var(--panel-border);
    border-radius: 14px;
    padding: 12px 10px;
    color: var(--cream);
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    transition: border-color 0.15s ease, background 0.15s ease, transform 0.1s ease;
    text-align: left;
  }

  .chip .emoji { font-size: 18px; }

  .chip.active {
    border-color: var(--brass);
    background: linear-gradient(135deg, rgba(201,151,77,0.28), rgba(201,151,77,0.10));
  }

  .chip:active { transform: scale(0.97); }

  .gap { margin-top: 14px; }

  .hint {
    font-size: 12px;
    color: var(--danger);
    margin: 8px 2px 0;
    min-height: 16px;
    opacity: 0;
    transform: translateY(-2px);
    transition: opacity 0.2s ease, transform 0.2s ease;
  }

  .hint.show { opacity: 1; transform: translateY(0); }

  .ring-zone {
    margin-top: auto;
    padding-top: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .bell-btn {
    position: relative;
    width: 132px;
    height: 132px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    background: radial-gradient(circle at 35% 30%, var(--brass-light), var(--brass) 55%, #8a6a34 100%);
    box-shadow: 0 10px 30px rgba(201,151,77,0.35), inset 0 2px 6px rgba(255,255,255,0.35), inset 0 -6px 10px rgba(0,0,0,0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.12s ease, box-shadow 0.3s ease, filter 0.3s ease;
    flex-shrink: 0;
    animation: breathe 3.2s ease-in-out infinite;
  }

  @keyframes breathe {
    0%, 100% { box-shadow: 0 10px 30px rgba(201,151,77,0.35), inset 0 2px 6px rgba(255,255,255,0.35), inset 0 -6px 10px rgba(0,0,0,0.25); }
    50% { box-shadow: 0 10px 44px rgba(232,192,119,0.6), inset 0 2px 6px rgba(255,255,255,0.4), inset 0 -6px 10px rgba(0,0,0,0.25); }
  }

  .bell-btn:active { transform: scale(0.9); }

  .bell-btn.ringing {
    animation: shake 0.5s ease-in-out;
  }

  @keyframes shake {
    0%, 100% { transform: rotate(0); }
    20% { transform: rotate(-12deg); }
    40% { transform: rotate(10deg); }
    60% { transform: rotate(-7deg); }
    80% { transform: rotate(4deg); }
  }

  .bell-btn:disabled {
    filter: grayscale(0.4) brightness(0.75);
    cursor: default;
    animation: none;
  }

  .bell-btn svg { width: 52px; height: 52px; position: relative; z-index: 2; }

  .ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 2px solid var(--brass-light);
    opacity: 0;
    pointer-events: none;
  }

  .ring.animate {
    animation: expand 1.1s ease-out forwards;
  }

  .ring.r2.animate { animation-delay: 0.15s; }
  .ring.r3.animate { animation-delay: 0.3s; }

  @keyframes expand {
    0% { transform: scale(1); opacity: 0.7; }
    100% { transform: scale(2.4); opacity: 0; }
  }

  .flash {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at 50% 78%, rgba(255,216,150,0.55), transparent 60%);
    opacity: 0;
    pointer-events: none;
    z-index: 3;
  }

  .flash.burst {
    animation: flashpop 0.6s ease-out forwards;
  }

  @keyframes flashpop {
    0% { opacity: 0; }
    25% { opacity: 1; }
    100% { opacity: 0; }
  }

  .sparkle-field {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 4;
  }

  .sparkle {
    position: absolute;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--brass-light);
    box-shadow: 0 0 6px 1px var(--brass-light);
    left: var(--x, 50%);
    top: var(--y, 70%);
    animation: sparkle-out 0.9s ease-out forwards;
  }

  @keyframes sparkle-out {
    0% { transform: translate(0, 0) scale(1); opacity: 1; }
    100% { transform: translate(var(--tx, 0), var(--ty, -60px)) scale(0); opacity: 0; }
  }

  .ring-caption {
    font-size: 14px;
    font-weight: 600;
    color: var(--cream);
    text-align: center;
  }

  .ring-status {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--cream-dim);
    text-align: center;
    min-height: 16px;
  }

  .ring-status.success { color: var(--sage); }
  .ring-status.error { color: var(--danger); }

  footer {
    text-align: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: rgba(245,239,228,0.28);
    padding-top: 4px;
  }

  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    .firefly, .sparkle { display: none; }
  }
</style>
</head>
<body>

<div class="glow-orb" id="glowOrb"></div>
<div class="particle-field" id="particleField"></div>
<div class="flash" id="flashFx"></div>
<div class="sparkle-field" id="sparkleField"></div>

<div class="wrap">

  <header>
    <p class="eyebrow" id="timeEyebrow">—</p>
    <h1>กดกริ่ง</h1>
    <p class="sub">แจ้งเจ้าของบ้านให้รู้ว่าคุณมาถึงแล้ว</p>
  </header>

  <div class="panel">
    <label class="field-label" for="guestName">ชื่อของคุณ <span class="opt">(ไม่ระบุก็ได้)</span></label>
    <input type="text" id="guestName" placeholder="เช่น พี่ไปรษณีย์, Grab, ลูกค้า" maxlength="60">

    <label class="field-label gap">มาทำอะไร</label>
    <div class="chips" id="purposeChips">
      <button type="button" class="chip" data-value="ส่งอาหาร"><span class="emoji">🍜</span>ส่งอาหาร</button>
      <button type="button" class="chip" data-value="ส่งพัสดุ"><span class="emoji">📦</span>ส่งพัสดุ</button>
      <button type="button" class="chip" data-value="รับยา"><span class="emoji">💊</span>รับยา</button>
      <button type="button" class="chip" data-value="อื่นๆ"><span class="emoji">✍️</span>อื่นๆ</button>
    </div>
    <p class="hint" id="purposeHint">เลือกเหตุผลที่มาก่อนกดกริ่ง</p>

    <label class="field-label gap" for="guestMsg">ข้อความเพิ่มเติม <span class="opt">(ถ้ามี)</span></label>
    <textarea id="guestMsg" placeholder="เช่น รอที่หน้าประตูสักครู่" maxlength="140"></textarea>
  </div>

  <div class="ring-zone">
    <button class="bell-btn" id="bellBtn" aria-label="กดกริ่ง">
      <span class="ring r1" id="ringFx"></span>
      <span class="ring r2" id="ringFx2"></span>
      <span class="ring r3" id="ringFx3"></span>
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 3C9.5 3 8 5 8 7.5v3c0 1.2-.5 2.3-1.4 3.1L5 15.2c-.6.5-.3 1.5.5 1.5h13c.8 0 1.1-1 .5-1.5l-1.6-1.6c-.9-.8-1.4-1.9-1.4-3.1v-3C16 5 14.5 3 12 3z" stroke="#12162B" stroke-width="1.6" stroke-linejoin="round" fill="rgba(10,13,29,0.15)"/>
        <path d="M10 18a2 2 0 0 0 4 0" stroke="#12162B" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
    </button>
    <p class="ring-caption" id="ringCaption">แตะเพื่อกดกริ่ง</p>
    <p class="ring-status" id="ringStatus"></p>
  </div>

  <footer>MORKWAN HOME · กริ่งประตู</footer>

</div>

<script>
  // ---- ตั้งค่า ----
  // วาง Discord Webhook URL ของคุณตรงนี้ (Server Settings > Integrations > Webhooks > Copy URL)
  // คำเตือน: ค่านี้จะถูกมองเห็นได้จาก view-source ของทุกคนที่เปิดหน้านี้ (ยอมรับความเสี่ยงแล้วตามที่คุยกัน)
  const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/1522560371146096790/MGRZVWG5BmOzXqLD9_gSKB2iHM0IZUvpgSbU9FyJU5kVLkXdSA5YzLTKqtCLLb84Ed2x";
  const COOLDOWN_SECONDS = 45;

  const PURPOSE_EMOJI = {
    "ส่งอาหาร": "🍜",
    "ส่งพัสดุ": "📦",
    "รับยา": "💊",
    "อื่นๆ": "✍️"
  };

  function formatThaiTime(date) {
    return new Intl.DateTimeFormat("th-TH-u-ca-buddhist", {
      dateStyle: "long",
      timeStyle: "short",
      timeZone: "Asia/Bangkok"
    }).format(date);
  }

  // ---- โทนสีตามช่วงเวลา ----
  const hour = new Date().getHours();
  let eyebrowText, glowColor, glowOpacity;
  if (hour >= 5 && hour < 11) {
    eyebrowText = "อรุณสวัสดิ์"; glowColor = "#FFD9A0"; glowOpacity = "0.28";
  } else if (hour >= 11 && hour < 17) {
    eyebrowText = "ช่วงกลางวัน"; glowColor = "#FFE9C2"; glowOpacity = "0.18";
  } else if (hour >= 17 && hour < 20) {
    eyebrowText = "โพล้เพล้"; glowColor = "#FFB86B"; glowOpacity = "0.4";
  } else {
    eyebrowText = "ยามค่ำคืน"; glowColor = "#7C8CD9"; glowOpacity = "0.3";
  }
  document.getElementById("timeEyebrow").textContent = eyebrowText;
  document.getElementById("glowOrb").style.setProperty("--glow-color", glowColor);
  document.getElementById("glowOrb").style.setProperty("--glow-opacity", glowOpacity);

  // ---- หิ่งห้อยลอยพื้นหลัง ----
  const particleField = document.getElementById("particleField");
  const FIREFLY_COUNT = 16;
  for (let i = 0; i < FIREFLY_COUNT; i++) {
    const f = document.createElement("span");
    f.className = "firefly";
    f.style.left = `${Math.random() * 100}%`;
    f.style.setProperty("--size", `${2 + Math.random() * 3}px`);
    f.style.setProperty("--dur", `${7 + Math.random() * 8}s`);
    f.style.setProperty("--delay", `${Math.random() * -10}s`);
    f.style.setProperty("--sway", `${(Math.random() - 0.5) * 60}px`);
    f.style.setProperty("--peak", `${0.4 + Math.random() * 0.4}`);
    f.style.setProperty("--glow-color", glowColor);
    particleField.appendChild(f);
  }

  // ---- เลือกวัตถุประสงค์ ----
  let selectedPurpose = null;
  const chips = document.querySelectorAll(".chip");
  const purposeHint = document.getElementById("purposeHint");
  chips.forEach(chip => {
    chip.addEventListener("click", () => {
      chips.forEach(c => c.classList.remove("active"));
      chip.classList.add("active");
      selectedPurpose = chip.dataset.value;
      purposeHint.classList.remove("show");
    });
  });

  // ---- กดกริ่ง ----
  const bellBtn = document.getElementById("bellBtn");
  const ringFx = document.getElementById("ringFx");
  const ringFx2 = document.getElementById("ringFx2");
  const ringFx3 = document.getElementById("ringFx3");
  const flashFx = document.getElementById("flashFx");
  const sparkleField = document.getElementById("sparkleField");
  const ringCaption = document.getElementById("ringCaption");
  const ringStatus = document.getElementById("ringStatus");

  let cooldownTimer = null;

  function playRipple() {
    [ringFx, ringFx2, ringFx3].forEach(el => {
      el.classList.remove("animate");
      void el.offsetWidth;
      el.classList.add("animate");
    });
    bellBtn.classList.remove("ringing");
    void bellBtn.offsetWidth;
    bellBtn.classList.add("ringing");
    flashFx.classList.remove("burst");
    void flashFx.offsetWidth;
    flashFx.classList.add("burst");
  }

  function playSparkleBurst() {
    const rect = bellBtn.getBoundingClientRect();
    const originX = rect.left + rect.width / 2;
    const originY = rect.top + rect.height / 2;
    const count = 18;
    for (let i = 0; i < count; i++) {
      const s = document.createElement("span");
      s.className = "sparkle";
      const angle = (Math.PI * 2 * i) / count + Math.random() * 0.3;
      const dist = 50 + Math.random() * 70;
      s.style.setProperty("--x", `${originX}px`);
      s.style.setProperty("--y", `${originY}px`);
      s.style.setProperty("--tx", `${Math.cos(angle) * dist}px`);
      s.style.setProperty("--ty", `${Math.sin(angle) * dist - 30}px`);
      sparkleField.appendChild(s);
      setTimeout(() => s.remove(), 950);
    }
  }

  function startCooldown(seconds) {
    let remaining = seconds;
    bellBtn.disabled = true;
    const tick = () => {
      const m = Math.floor(remaining / 60);
      const s = String(remaining % 60).padStart(2, "0");
      ringCaption.textContent = `กดกริ่งได้อีกครั้งใน ${m}:${s}`;
      remaining--;
      if (remaining < 0) {
        clearInterval(cooldownTimer);
        bellBtn.disabled = false;
        ringCaption.textContent = "แตะเพื่อกดกริ่ง";
        ringStatus.textContent = "";
        ringStatus.className = "ring-status";
      }
    };
    tick();
    cooldownTimer = setInterval(tick, 1000);
  }

  async function sendRing() {
    if (DISCORD_WEBHOOK_URL.includes("PASTE_YOUR")) {
      ringCaption.textContent = "ยังไม่ได้ตั้งค่า Webhook URL";
      ringStatus.textContent = "แก้ DISCORD_WEBHOOK_URL ในโค้ดก่อนใช้งานจริง";
      ringStatus.className = "ring-status error";
      return;
    }
    if (!selectedPurpose) {
      purposeHint.classList.add("show");
      document.getElementById("purposeChips").animate(
        [{ transform: "translateX(-4px)" }, { transform: "translateX(4px)" }, { transform: "translateX(0)" }],
        { duration: 220 }
      );
      return;
    }

    bellBtn.disabled = true;
    playRipple();

    ringCaption.textContent = "กำลังส่ง...";
    ringStatus.textContent = "";
    ringStatus.className = "ring-status";

    const guestName = document.getElementById("guestName").value.trim() || "ไม่ระบุชื่อ";
    const guestMsg = document.getElementById("guestMsg").value.trim();
    const emoji = PURPOSE_EMOJI[selectedPurpose] || "🔔";

    const embed = {
      title: `${emoji} มีคนกดกริ่ง — ${selectedPurpose}`,
      color: 0xC9974D,
      fields: [
        { name: "ชื่อ", value: guestName, inline: true },
        { name: "เวลา", value: formatThaiTime(new Date()), inline: true }
      ]
    };
    if (guestMsg) {
      embed.fields.push({ name: "ข้อความ", value: guestMsg, inline: false });
    }

    try {
      const res = await fetch(DISCORD_WEBHOOK_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ embeds: [embed] })
      });
      if (!res.ok) throw new Error("bad status");

      ringCaption.textContent = "ส่งแจ้งเตือนแล้ว";
      ringStatus.textContent = "รอสักครู่ เจ้าของบ้านกำลังมา";
      ringStatus.className = "ring-status success";
      playSparkleBurst();
      startCooldown(COOLDOWN_SECONDS);
    } catch (err) {
      ringCaption.textContent = "ส่งไม่สำเร็จ";
      ringStatus.textContent = "แตะปุ่มอีกครั้งเพื่อลองใหม่";
      ringStatus.className = "ring-status error";
      bellBtn.disabled = false;
    }
  }

  bellBtn.addEventListener("click", sendRing);
</script>

</body>
</html>
